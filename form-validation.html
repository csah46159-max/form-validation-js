<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Form Validation</title>
    <style>
        body {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        .container {
            width: 40%;
            margin: 30px auto;
        }

        textarea {
            resize: vertical;
        }

        .error {
            color: red;
            font-size: 11px;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("form1").addEventListener("submit", function (event) {
                event.preventDefault();
            })
        })
        function validateForm() {
            resetForm();
            let isValid = true;
            let name = document.getElementById("name");
            let address = document.getElementById("address");
            let email = document.getElementById("email");
            let password = document.getElementById("password");
            let cpassword = document.getElementById("cpassword");
            let phone = document.getElementById("phone");
            let course = document.getElementById("course");
            let comments = document.getElementById("comments");
            let agree = document.getElementById("agree");
            if (!name.value.trim() || name.value === "") {
                document.getElementById("errname").textContent = "Please enter your name";
                isValid = false;
            }
            if (!address.value.trim() || address.value == "") {
                document.getElementById("erraddress").textContent = "Please enter your Address";
                isValid = false;
            }
            if(!validateEmail(email))
            {
                isValid=false;
            }
            // let regx= /^[a-z_]([a-z0-9\._\-]+)@([a-z]+)\.([a-z]){2,4}$/
            // if (regx.test(email.value) == false) {
            //     document.getElementById("erremail").textContent = "Enter valid email address";
            //     isValid = false;
            // }
            if (!password.value.trim() || password.value == "" || password.length < 8) {
                document.getElementById("errpassword").textContent = "Please enter your password and must be 8 characters long";
                isValid = false;
            }
            if (!cpassword.value.trim() || cpassword.value == "" || password.length != cpassword.length || password.value != cpassword.value) {
                document.getElementById("errcpassword").textContent = "Password and confirm does not match";
                isValid = false;
            }
            if (!phone.value.trim() || phone.value == "" || isNaN(phone.value)) {
                document.getElementById("errphone").textContent = "Please enter valid phone name";
                isValid = false;
            }
            if (course.value == "") {
                document.getElementById("errcourse").textContent = "Please select your course";
                isValid = false;
            }
            if (!comments.value.trim() || comments.value == "") {
                document.getElementById("errcomments").textContent = "Please leave a comment";
                isValid = false;
            }
            if (!agree.checked) {
                document.getElementById("erragree").textContent = "You must agree to terms and conditions";
                isValid = false;
            }
            return isValid;
        }
        function resetForm() {
            let spnElements = document.querySelectorAll(".error");
            spnElements.forEach(function (element) {
                element.textContent = "";
            })
            // document.getElementById("errname").textContent="";
            // document.getElementById("erraddress").textContent="";
            // document.getElementById("errpassword").textContent="";
            // document.getElementById("errcpassword").textContent="";
            // document.getElementById("errphone").textContent="";
            // document.getElementById("errcourse").textContent="";
            // document.getElementById("errcomments").textContent="";
            // document.getElementById("erragree").textContent="";
        }
        function validateEmail(email) {
            let atpos=email.value.indexOf("@");
            let dotpos=email.value.lastIndexOf(".");
            let errEmail=document.getElementById("erremail");
            if (!email.value.trim() || email.value == "") {
                errEmail.textContent="Email is required";
                return false;
            }
            if(email.value.includes("@@") || email.value.includes(".."))
            {
                errEmail.textContent="Invalid Email address";
                return false;
            }
            if(atpos<1 || dotpos<atpos+2 || dotpos+2>=email.value.length)
            {
                errEmail.textContent="Invalid Email address";
                return false;
            }
            return true;
           

        }
    </script>

</head>

<body>
    <div class="container">
        <form action="" method="post" id="form1" onsubmit="validateForm();" onreset="return resetForm();">
            <fieldset>
                <legend>
                    <h2>Complete Form Validation</h2>
                </legend>
                <table>
                    <tr>
                        <td><label for="name">Enter your Name</label></td>
                        <td>
                            <input type="text" id="name">
                            <span id="errname" class="error"></span>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="address">Enter your address</label></td>
                        <td>
                            <input type="text" id="address">
                            <span class="error" id="erraddress"></span>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="email">Enter your Email</label></td>
                        <td>
                            <input type="text" id="email">
                            <span class="error" id="erremail"></span>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="password">Enter your password</label></td>
                        <td>
                            <input type="password" id="password">
                            <span class="error" id="errpassword"></span>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="cpassword">Confirm Password</label></td>
                        <td>
                            <input type="password" id="cpassword">
                            <span class="error" id="errcpassword"></span>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="phone">Enter phone</label>
                        </td>
                        <td>
                            <input type="text" id="phone">
                            <span class="error" id="errphone"></span>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="course">Select Course</label></td>
                        <td>
                            <select id="course">
                                <option value="">Select cousre</option>
                                <option value="BE">BE</option>
                                <option value="BIM">BIM</option>
                                <option value="BSCCSIT">BSCCSIT</option>
                                <option value="BCA">BCA</option>
                            </select>
                            <span class="error" id="errcourse"></span>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="comments">Comments</label></td>
                        <td>
                            <textarea id="comments"></textarea>
                            <span class="error" id="errcomments"></span>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <input type="checkbox" id="agree">
                        </td>
                        <td>
                            <label for="">I agree to the tems and conditions</label>
                            <span class="error" id="erragree"></span>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <input type="submit" value="Submit">
                            <input type="reset" value="reset">
                        </td>

                    </tr>
                </table>
            </fieldset>
        </form>
    </div>
</body>

</html>
